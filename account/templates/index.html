{% extends 'base.html' %}
{% load static %}

{% block 'head' %}
    <link rel="stylesheet" href="{% static 'account/css/login.css'%}">
{% endblock 'head' %}

{% block 'title'%}Login{% endblock 'title' %}

{% block 'body' %}

    <div class="container main">
        <div class="row">
            <div class="col-md-6 left">
                <div class="text-dark position-absolute top-50 start-50 translate-middle">
                    <p>Task Manager</p>
                    <p><i>Gerenciador de Tarefas</i></p>
                </div>
            </div>
            <div class="col-md-6 right">                
                <div class="input-box">                
                    <header>Login</header>
                    <form action="{% url 'account:log_in' %}" method="POST">
                        {% csrf_token %}
                        <div class="input-field">
                            <input type="text" class="input" name="email" required="" autocomplete="off">
                            <label for="email">E-mail</label> 
                        </div> 
                        <div class="input-field">
                            <input type="password" class="input" name="password" required="">
                            <label for="password">Senha</label>
                        </div> 
                        <div class="input-field">                        
                            <input type="submit" class="submit" value="Entrar">
                        </div> 
                    </form>
                    <div class="signin">
                        <span>Não possui acesso? <a href="{% url 'account:register' %}">Cadastre-se aqui</a></span>
                    </div>
                </div>  
            </div>
        </div>
    </div>

{% endblock 'body' %}
